name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Validate repository
        run: npm run validate

      - name: Run tests
        run: npm test

      - name: Generate browser targets
        run: npm run build

  package:
    name: Package browser candidates
    runs-on: ubuntu-latest
    needs: validate-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build release archives
        run: npm run package:all

      - name: Generate checksums
        run: sha256sum releases/*.zip > releases/SHA256SUMS.txt

      - name: Upload release candidates
        uses: actions/upload-artifact@v4
        with:
          name: pin-copy-browser-packages
          path: releases/
          if-no-files-found: error
          retention-days: 14
